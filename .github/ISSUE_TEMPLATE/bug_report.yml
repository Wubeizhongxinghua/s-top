name: Bug report
description: Report a reproducible problem in sqtop
title: "[bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report. Please include enough detail to reproduce the problem in a Slurm environment.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: List the exact steps, commands, and navigation path
      placeholder: |
        1. Run `sqtop --once`
        2. Open the Users page
        3. Press Enter on ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, terminal, and Slurm details
      placeholder: |
        OS:
        Terminal:
        Slurm version:
        Install method:
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: Include relevant `sqtop --once` / `sqtop --debug-dump` excerpts, logs, or screenshots
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues first
          required: true
        - label: I redacted sensitive cluster details before posting
          required: true
