name: Feature request
description: Suggest an improvement for sqtop
title: "[feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What workflow or pain point should improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature, view, interaction, or packaging change you want
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Slurm / cluster context
      description: Explain any environment-specific details that matter
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What are you doing today instead?
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues first
          required: true
