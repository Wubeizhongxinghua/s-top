name: publish-packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish-crates:
    name: publish-crates-io
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && secrets.CARGO_REGISTRY_TOKEN != ''
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish crate
        run: cargo publish --locked --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"

  build-conda:
    name: build-conda-linux-64
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set package version
        run: echo "ST_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Setup Miniforge
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-variant: Miniforge3
          miniforge-version: latest
          channels: conda-forge
          channel-priority: strict
          activate-environment: conda-build
          auto-activate-base: false
          use-mamba: true

      - name: Install conda-build tooling
        shell: bash -el {0}
        run: |
          mamba install -y conda-build anaconda-client

      - name: Build conda package
        shell: bash -el {0}
        run: |
          conda build recipe --output-folder conda-dist

      - name: Record conda artifact path
        shell: bash -el {0}
        run: |
          PACKAGE_PATH="$(find conda-dist -type f \( -name '*.conda' -o -name '*.tar.bz2' \) | head -n 1)"
          if [[ -z "${PACKAGE_PATH}" ]]; then
            echo "No conda package was produced" >&2
            exit 1
          fi
          echo "PACKAGE_PATH=${PACKAGE_PATH}" >> "$GITHUB_ENV"

      - name: Upload conda artifact
        uses: actions/upload-artifact@v4
        with:
          name: conda-linux-64
          path: ${{ env.PACKAGE_PATH }}

      - name: Upload to Anaconda.org
        if: secrets.ANACONDA_API_TOKEN != ''
        shell: bash -el {0}
        env:
          ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_API_TOKEN }}
        run: |
          anaconda -t "${ANACONDA_API_TOKEN}" upload \
            --user "${GITHUB_REPOSITORY_OWNER}" \
            --label main \
            "${PACKAGE_PATH}"
