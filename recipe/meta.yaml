{% set version = environ.get("ST_VERSION", "0.1.7") %}

package:
  name: s-top
  version: {{ version }}

source:
  path: ..

build:
  number: 0

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('rust') }}
    - {{ stdlib('c') }}

test:
  commands:
    - s-top --help

about:
  home: https://github.com/Wubeizhongxinghua/s-top
  summary: Interactive terminal monitor for Slurm clusters
  license: MIT
  license_file: LICENSE
  dev_url: https://github.com/Wubeizhongxinghua/s-top

extra:
  recipe-maintainers:
    - Wubeizhongxinghua
